# Publish arborito-sdk to PyPI on push to main (tag vX.Y.Z).
# Uses version from pyproject.toml. Re-runs are safe (skip-existing).
#
# Setup (once on PyPI):
#   Trusted publisher → owner treesys-org, repo arborito-sdk, workflow sdk-publish.yml
#   OR store PYPI_API_TOKEN as a repo secret and uncomment the token line below.
name: Publish to PyPI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        run: |
          VER=$(python -c "import pathlib; t=pathlib.Path('pyproject.toml').read_text(); import re; m=re.search(r'^version = \"([^\"]+)\"', t, re.M); print(m.group(1) if m else '')")
          if [ -z "$VER" ]; then
            echo "::error::Could not read version from pyproject.toml"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_ENV"
          echo "Publishing arborito-sdk $VER to PyPI"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
